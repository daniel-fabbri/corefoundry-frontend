name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_COREFOUNDRY_API_URL: https://5c76-2804-14d-5c41-9977-a417-c16c-a3a1-d0a2.ngrok-free.app
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Listing dist/ contents ==="
          ls -la dist/
          if [ -f dist/index.html ]; then
            echo "=== Checking dist/index.html size ==="
            wc -c dist/index.html
            echo "=== First 30 lines of dist/index.html ==="
            head -30 dist/index.html
            echo "=== Checking for JS files ==="
            find dist -name "*.js" -type f
          else
            echo "ERROR: dist/index.html not found!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
